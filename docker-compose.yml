services:
  frontend:
    image: ${FRONTEND_IMAGE:-fitpilot-frontend:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_NUTRITION_API_URL: ${VITE_NUTRITION_API_URL:-https://nutrition-api.fitpilot.fit}
        VITE_TRAINING_API_URL: ${VITE_TRAINING_API_URL:-https://training-api.fitpilot.fit/}
    ports:
      - "${FRONTEND_PORT:-4000}:80"
    restart: unless-stopped
