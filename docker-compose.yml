services:
  frontend:
    container_name: ${CONTAINER_NAME}
    image: ghcr.io/${GHCR_OWNER:-owner}/fitpilot-frontend:${IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_NUTRITION_API_URL: ${VITE_NUTRITION_API_URL:-https://nutrition-api.fitpilot.fit}
        VITE_TRAINING_API_URL: ${VITE_TRAINING_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped
